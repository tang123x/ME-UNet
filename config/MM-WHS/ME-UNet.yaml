# Experiment setup
default_root_dir: "./experiments"
study_name: MM-WHS
trial_name: ME-UNet

# Model
model: ME-UNet
in_channels: 1
out_channels: 8
patch_size: 2
depths: [2, 2, 2, 2]
num_heads: [3, 6, 12, 24]
window_size: 7
qkv_bias: true
mlp_ratio: 4.0
feature_size: 48
drop_rate: 0.0
attn_drop_rate: 0.0
dropout_path_rate: 0.0
normalize: true
patch_norm: false
use_checkpoint: false
spatial_dims: 3
downsample: merging
vit_norm: layer
enc_norm:
  - instance
  - affine: false
dec_norm:
  - instance
  - affine: false
freeze_enc: false
use_v2: false

# Training
epochs: 2
iters_to_accumulate: 1
check_val_every_n_epoch: 2
amp: false
find_unused_parameters: true

# Loss
criterion: dice_focal
smooth_nr: 0.0
smooth_dr: 0.000001

# Metrics
include_background: false
classes:
  0: BG
  1: LV
  2: RV
  3: LA
  4: RA
  5: MYO
  6: AA
  7: PA
modalities:
  0: CT
  1: MRI

# Optimizer
optim_name: adamw
lr: 0.0001
reg_weight: 0.00001
squared_pred: true

# Scheduler
scheduler: warmup_cosine
warmup_epochs: 1
cycles: 0.5

# Model Inferer
infer_overlap: 0.5
sw_batch_size: 1
inferer_device: cpu

# Datasets
data_dirs:
  - ../../Datasets/MM-WHS
  - ../../Datasets/MM-WHS
json_lists:
  - CT.json
  - MR.json
batch_size: 1
roi_x: 96
roi_y: 96
roi_z: 96
space_x: 1.0
space_y: 1.0
space_z: 1.0
patches_training_sample: 1
randFlipd_prob: 0.2
randRotate90d_prob: 0.2
randScaleIntensityd_prob: 0.1
randShiftIntensityd_prob: 0.1
use_normal_dataset: false # No CacheDataset from monai
cache_num: 24
loader_workers: 8 # To load in cache
num_workers: 8 # Per dataloader
